name: Build Windows Executable

on:
  workflow_dispatch:
    inputs:
      BASE_URL:
        description: 'Server Base URL (e.g., https://your-server.example.com )'
        required: true
        default: 'https://your-server.example.com'
      DEVICE_ID:
        description: 'Device ID'
        required: true
        default: '8c2f0000-0000-0000-0000-000000000000'
      DEVICE_PASSWORD:
        description: 'Device Password'
        required: true
        default: 'a1b2c3d4e5f60718'
      DEPARTMENT_LABEL:
        description: 'Department Label (Optional )'
        required: false
        default: 'Ops'
      QR_CONTENT_TEMPLATE:
        description: 'QR Content Template (Optional)'
        required: false
        default: '{code}'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller python-dotenv

    - name: Prepare environment and auto-correct URL
      shell: bash
      run: |
        # Auto-correct BASE_URL by removing trailing slash and appending the API path
        RAW_URL="${{ github.event.inputs.BASE_URL }}"
        CLEAN_URL="${RAW_URL%/}"
        DEPT_CODE_URL="${CLEAN_URL}/api/public/dept-code"
        
        echo "DEPT_CODE_URL=${DEPT_CODE_URL}" >> .env
        echo "DEVICE_ID=${{ github.event.inputs.DEVICE_ID }}" >> .env
        echo "DEVICE_PASSWORD=${{ github.event.inputs.DEVICE_PASSWORD }}" >> .env
        echo "DEPARTMENT_LABEL=${{ github.event.inputs.DEPARTMENT_LABEL }}" >> .env
        echo "QR_CONTENT_TEMPLATE=${{ github.event.inputs.QR_CONTENT_TEMPLATE }}" >> .env
        
        echo "Constructed DEPT_CODE_URL: ${DEPT_CODE_URL}"

    - name: Run build.py
      run: python build.py

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: AttendanceQR-Windows-Executable
        path: dist/AttendanceQR.exe
